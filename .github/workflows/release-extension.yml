name: Release Extension Package

on:
  push:
    tags:
      - "extension-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build extension package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Verify extension version matches release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # GitHub Actions does not accept `shell: node` — use bash + jq
          # (preinstalled on ubuntu-latest) for a portable version check.
          expected="${RELEASE_TAG#extension-v}"
          manifest_version=$(jq -r .version extension/manifest.json)
          pkg_version=$(jq -r .version extension/package.json)
          if [ "$manifest_version" != "$expected" ]; then
            echo "extension release tag $RELEASE_TAG does not match manifest version $manifest_version"
            exit 1
          fi
          if [ "$pkg_version" != "$expected" ]; then
            echo "extension release tag $RELEASE_TAG does not match package version $pkg_version"
            exit 1
          fi

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension release archive
        run: npm run package
        working-directory: extension

      - name: Verify extension release archive
        shell: bash
        run: |
          shopt -s nullglob
          archives=(extension/openbiliclaw-extension-v*.zip)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "expected exactly one extension archive, got: ${archives[*]}"
            exit 1
          fi
          echo "verified release archive: ${archives[0]}"

      - name: Upload packaged extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: extension/openbiliclaw-extension-v*.zip
          if-no-files-found: error

  publish-release:
    name: Publish extension release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: release-artifacts

      - name: Verify downloaded extension artifact
        shell: bash
        run: |
          shopt -s nullglob
          archives=(release-artifacts/openbiliclaw-extension-v*.zip)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "expected exactly one extension archive, got: ${archives[*]}"
            exit 1
          fi
          echo "release artifact ready: ${archives[0]}"

      - name: Create GitHub Release and upload extension package
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/openbiliclaw-extension-v*.zip
          generate_release_notes: true
