<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenBiliClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
    }
    .header {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header h1 {
      font-size: 18px;
      color: #00d4ff;
    }
    .header p {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .section {
      padding: 12px 16px;
    }
    .section-title {
      font-size: 13px;
      color: #00d4ff;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }
    .status-dot.offline { background: #f44336; }
    .placeholder {
      text-align: center;
      padding: 24px 16px;
      color: #666;
      font-size: 13px;
    }
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #555;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦀 OpenBiliClaw</h1>
    <p>你的 B 站专属 AI 朋友</p>
  </div>

  <div class="section">
    <div class="section-title">状态</div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">连接中...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">推荐</div>
    <div class="placeholder">
      <p>功能开发中 🚧</p>
      <p>推荐内容将在这里显示</p>
    </div>
  </div>

  <div class="footer">
    OpenBiliClaw v0.1.0-dev
  </div>

  <script src="popup.js"></script>
</body>
</html>
